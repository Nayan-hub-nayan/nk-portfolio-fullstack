<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo1.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Primary Meta Tags -->
    <title>Genex Portfolio | Modern Web & Mobile App Design studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Genex is a modern digital studio specializing in high-converting websites and mobile apps. Explore our portfolio of UX-focused, responsive, and SEO-friendly products."
    />
    <meta
      name="keywords"
      content="Genex, portfolio, web design, web development, mobile app design, UI UX, modern website, React, frontend developer"
    />
    <meta name="author" content="Genex" />

    <!-- Canonical URL (update href to your live domain) -->
    <link rel="canonical" href="https://www.prapal.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Genex Portfolio | Modern Web & Mobile App Design" />
    <meta
      property="og:description"
      content="See how Genex designs and builds modern, responsive websites and mobile applications tailored to your business."
    />
    <meta property="og:url" content="https://www.prapal.in/" />
    <meta property="og:site_name" content="Genex Portfolio" />
    <!-- Replace with an absolute URL to your share image -->
    <meta property="og:image" content="https://www.prapal.in/og-image" />
    <meta property="og:image:alt" content="Genex portfolio preview" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Genex Portfolio | Modern Web & Mobile App Design" />
    <meta
      name="twitter:description"
      content="Discover Genex projects: modern, responsive websites and mobile apps focused on performance and user experience."
    />
    <meta name="twitter:image" content="https://www.prapal.in/logo1.png" />

    <!-- Structured Data: Organization (basic SEO enhancement) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Genex",
        "url": "https://www.genex-portfolio.com/",
        "logo": "https://www.genex-portfolio.com/logo1.png",
        "description": "Genex is a modern digital studio focused on web and mobile app design and development.",
        "sameAs": []
      }
    </script>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo1.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  </head>
  <body>
    <noscript>We design mordern website and mobile apps.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
